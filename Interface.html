<!DOCTYPE html>
<html>
    <head>
        <link rel="stylesheet" href="Interface.css">
        <title>
            Weather Today
        </title>
    </head>
    <body class="Background">
        <div class="Heading">
            &#9729; Today's Weather &#9729;
        </div>
        <div>
            <p class="Weather-emoji">☀️</p>
        </div>
        <div class="Temperature">
            29 &deg;C
        </div>
        <div class="City-name">
            📍Kochi
        </div>
        <div class="Weather-Desc">
            Partly Cloudy
        </div>
        <div class="Description-box">
            <div class="Info">
                <span>💧 Humidity</span>
                <span class="values">72%</span>
            </div>
            <div class="Info">
                <span>🌬 Wind</span>
                <span class="values">12 km/h</span>
            </div>
            <div class="Info">
                <span>🌅 Sunrise</span>
                <span class="values">6:12 AM</span>
            </div>
            <div class="Info">
                <span>🌇 Sunset</span>
                <span class="values">6:43 PM</span>
            </div>
            <div class="Info">
                <span>🌎 Country</span>
                <span class="values">IND</span>
            </div>
        </div>
        <div>
            <button class="City-Change">
                📍
            </button>
        </div>
    </body>
</html>
